version: '3.8'

services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY}/app:latest
    container_name: comunidade_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - ./storage:/var/www/storage
    networks:
      - comunidade_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=comunidade_db
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - FRONTEND_URL=${FRONTEND_URL}

  web:
    image: ghcr.io/${GITHUB_REPOSITORY}/web:latest
    container_name: comunidade_web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - comunidade_net
    depends_on:
      - app

  db:
    image: postgres:15-alpine
    container_name: comunidade_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - comunidade_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: comunidade_redis
    restart: unless-stopped
    networks:
      - comunidade_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/frontend:latest
    container_name: comunidade_front
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - comunidade_net

networks:
  comunidade_net:
    driver: bridge

volumes:
  db_data:
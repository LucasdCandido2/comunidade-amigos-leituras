; PHP configuration for development environment
; Desabilita OPcache em dev para evitar segfaults (SIGSEGV) com PHP-FPM
opcache.enable=0
opcache.enable_cli=0

; Configurações de memória e performance
memory_limit=512M
max_execution_time=120
upload_max_filesize=32M
post_max_size=32M

; Configurações de erro (visíveis em dev)
display_errors=On
log_errors=On
error_reporting=E_ALL

; Criar diretórios necessários na inicialização
; run-always.sh cria pastas em /var/www/storage se não existirem
